<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0;padding:0;background:#f4f4f7;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f4f7;padding:40px 0;">
        <tr>
            <td align="center">
                <table width="520" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.08);">
                    <tr>
                        <td style="background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);padding:28px 32px;">
                            <h1 style="margin:0;color:#ffffff;font-size:20px;font-weight:600;">New Registration Request</h1>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:32px;">
                            <p style="margin:0 0 20px;color:#555;font-size:15px;line-height:1.6;">
                                A new user has registered and is waiting for your approval.
                            </p>
                            <table width="100%" cellpadding="0" cellspacing="0" style="background:#f8f9fa;border-radius:8px;margin-bottom:24px;">
                                <tr>
                                    <td style="padding:16px 20px;">
                                        <p style="margin:0 0 4px;font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.5px;">Email</p>
                                        <p style="margin:0 0 14px;font-size:15px;color:#333;">{{ email }}</p>
                                        <p style="margin:0 0 4px;font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.5px;">Role</p>
                                        <p style="margin:0 0 14px;font-size:15px;color:#333;">{{ role }}</p>
                                        <p style="margin:0 0 4px;font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.5px;">Registered at</p>
                                        <p style="margin:0;font-size:15px;color:#333;">{{ registered_at }}</p>
                                    </td>
                                </tr>
                            </table>
                            <table width="100%" cellpadding="0" cellspacing="0">
                                <tr>
                                    <td align="center" style="padding-bottom:12px;">
                                        <a href="{{ approve_url }}" style="display:inline-block;background:#28a745;color:#ffffff;text-decoration:none;padding:12px 36px;border-radius:6px;font-size:15px;font-weight:600;">Approve</a>
                                    </td>
                                </tr>
                                <tr>
                                    <td align="center">
                                        <a href="{{ reject_url }}" style="display:inline-block;background:#dc3545;color:#ffffff;text-decoration:none;padding:12px 36px;border-radius:6px;font-size:15px;font-weight:600;">Reject</a>
                                    </td>
                                </tr>
                            </table>
                            <p style="margin:24px 0 0;font-size:12px;color:#999;text-align:center;">
                                These links expire in 7 days.
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
