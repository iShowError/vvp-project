<!-- Search, Filter & Sort Bar -->
<div class="card mb-4 filter-bar">
    <div class="card-header bg-white d-flex justify-content-between align-items-center py-2"
         data-bs-toggle="collapse" data-bs-target="#filterCollapse" role="button"
         aria-expanded="{{ active_filter_count|yesno:'true,false' }}" aria-controls="filterCollapse">
        <h6 class="mb-0">
            <i class="bi bi-funnel me-2"></i>Search &amp; Filter
            {% if active_filter_count %}
                <span class="badge rounded-pill bg-primary ms-2 active-count">{{ active_filter_count }} active</span>
            {% endif %}
        </h6>
        <i class="bi bi-chevron-down"></i>
    </div>
    <div class="collapse {% if active_filter_count %}show{% endif %}" id="filterCollapse">
        <div class="card-body py-3">
            <form method="GET" action="">
                <!-- Row 1: Search -->
                <div class="row g-3 mb-3">
                    <div class="col-12">
                        <label for="q" class="form-label">Search</label>
                        <div class="input-group input-group-sm">
                            <span class="input-group-text"><i class="bi bi-search"></i></span>
                            <input type="text" name="q" id="q" class="form-control"
                                   value="{{ request.GET.q|default:'' }}"
                                   placeholder="Search issue descriptions...">
                        </div>
                    </div>
                </div>

                <!-- Row 2: Dropdowns -->
                <div class="row g-3 mb-3">
                    <div class="col-sm-6 col-md-4">
                        <label for="status" class="form-label">Status</label>
                        <select name="status" id="status" class="form-select form-select-sm">
                            <option value="">All Statuses</option>
                            <option value="open" {% if request.GET.status == 'open' %}selected{% endif %}>Open</option>
                            <option value="in_progress" {% if request.GET.status == 'in_progress' %}selected{% endif %}>In Progress</option>
                            <option value="resolved" {% if request.GET.status == 'resolved' %}selected{% endif %}>Resolved</option>
                            <option value="completed" {% if request.GET.status == 'completed' %}selected{% endif %}>Completed</option>
                            <option value="closed" {% if request.GET.status == 'closed' %}selected{% endif %}>Closed</option>
                        </select>
                    </div>
                    <div class="col-sm-6 col-md-4">
                        <label for="priority" class="form-label">Priority</label>
                        <select name="priority" id="priority" class="form-select form-select-sm">
                            <option value="">All Priorities</option>
                            <option value="critical" {% if request.GET.priority == 'critical' %}selected{% endif %}>Critical</option>
                            <option value="high" {% if request.GET.priority == 'high' %}selected{% endif %}>High</option>
                            <option value="medium" {% if request.GET.priority == 'medium' %}selected{% endif %}>Medium</option>
                            <option value="low" {% if request.GET.priority == 'low' %}selected{% endif %}>Low</option>
                        </select>
                    </div>
                    <div class="col-sm-6 col-md-4">
                        <label for="device_type" class="form-label">Device Type</label>
                        <select name="device_type" id="device_type" class="form-select form-select-sm">
                            <option value="">All Devices</option>
                            {% for value, label in device_type_choices %}
                                <option value="{{ value }}" {% if request.GET.device_type == value %}selected{% endif %}>{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <!-- Row 3: Date range + Sort -->
                <div class="row g-3 mb-3">
                    <div class="col-sm-6 col-md-3">
                        <label for="date_from" class="form-label">From</label>
                        <input type="date" name="date_from" id="date_from" class="form-control form-control-sm"
                               value="{{ request.GET.date_from|default:'' }}">
                    </div>
                    <div class="col-sm-6 col-md-3">
                        <label for="date_to" class="form-label">To</label>
                        <input type="date" name="date_to" id="date_to" class="form-control form-control-sm"
                               value="{{ request.GET.date_to|default:'' }}">
                    </div>
                    <div class="col-sm-6 col-md-3">
                        <label for="sort" class="form-label">Sort By</label>
                        <select name="sort" id="sort" class="form-select form-select-sm">
                            <option value="-created_at" {% if request.GET.sort == '-created_at' or not request.GET.sort %}selected{% endif %}>Newest First</option>
                            <option value="created_at" {% if request.GET.sort == 'created_at' %}selected{% endif %}>Oldest First</option>
                            <option value="-priority" {% if request.GET.sort == '-priority' %}selected{% endif %}>Priority (High → Low)</option>
                            <option value="priority" {% if request.GET.sort == 'priority' %}selected{% endif %}>Priority (Low → High)</option>
                        </select>
                    </div>
                    <div class="col-sm-6 col-md-3 d-flex align-items-end gap-2">
                        <button type="submit" class="btn btn-sm btn-ims-primary flex-grow-1">
                            <i class="bi bi-funnel me-1"></i>Apply
                        </button>
                        <a href="{{ request.path }}" class="btn btn-sm btn-outline-secondary flex-grow-1">
                            <i class="bi bi-x-lg me-1"></i>Clear
                        </a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
